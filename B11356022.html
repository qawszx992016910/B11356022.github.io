<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於我們</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        
        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        
        .text-content {
            flex: 1;
        }
        
        .text-content h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .text-content p {
            color: #555;
            line-height: 1.6;
        }
        
        .text-content a {
            display: inline-block;
            margin-top: 10px;
            color: #6c63ff;
            text-decoration: none;
            font-weight: bold;
        }
        
        .social-icons a {
            margin-right: 10px;
            font-size: 18px;
            color: #555;
            text-decoration: none;
        }
        
        .image-content img {
            width: 250px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="text-content">
            <h1>ABOUT US</h1>
            <p>B11356022.</p>

</html>
